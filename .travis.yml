sudo: required
services:
  - docker

before_install:
  - docker build -t praveensg/docker-react -f Dockerfile.dev .

script:
  - docker run -e CI=true stephengrider/docker-react npm run test

deploy: 
  provider: elasticbeanstalk
  region: "ap-south-1"
  app: "frontend"
  env: "frontend-env"
  budket_name: ""